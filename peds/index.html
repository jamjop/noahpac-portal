<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <link rel="stylesheet" href="/assets/fonts.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dosing</title><link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="eyebrow">Airway · Fluids · Resus · RSI · Seizures · Pain · Abx</div>
    <h1>Pediatric Dosing</h1>
    <a href="/" class="back" target="_top">← noahpac</a>
    <div class="update-cadence">↻ Reviewed annually</div>
  </div>
</header>

<div class="content">
  <div class="criterion input-panel">
    <div class="c-header">
      <span class="c-letter">kg</span>
      <div>
        <div class="c-name">Patient Weight</div>
        <div class="c-desc">Enter weight directly, or estimate from age using the Broselow formula</div>
      </div>
    </div>
    <div class="input-grid">
      <div class="field field-wt">
        <label class="field-label" for="wtKg">Weight (kg)</label>
        <input type="number" id="wtKg" min="1" max="80" step="0.1" placeholder="e.g. 15">
      </div>
      <div class="or-sep">or estimate by</div>
      <div class="field field-age">
        <label class="field-label" for="ageNum">Age</label>
        <input type="number" id="ageNum" min="0" max="14" step="1" placeholder="e.g. 5">
      </div>
      <div class="field field-unit">
        <label class="field-label" for="ageUnit">Unit</label>
        <select id="ageUnit">
          <option value="yr">years</option>
          <option value="mo">months</option>
        </select>
      </div>
      <button class="calc-btn" id="calcBtn">Calculate</button>
    </div>
    <div class="brose-bar" id="broseBar" hidden>
      <div class="brose-swatch" id="broseSwatch"></div>
      <span class="brose-label" id="broseLabel"></span>
      <span class="brose-weight" id="broseWeight"></span>
    </div>
  </div>
  <div id="content"></div>
</div>
<footer>
  <p class="last-checked"></p>
</footer>

<script src="app.js"></script>
<script src="/assets/last-checked.js" defer></script>
</body>
</html>
