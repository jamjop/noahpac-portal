<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dosing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="eyebrow">Airway · Fluids · Resus · RSI · Seizures · Pain · Abx</div>
    <h1>Pediatric Dosing</h1>
    <a href="/" class="back" target="_top">← noahpac</a>
  </div>
</header>

<div class="content">
  <div class="panel input-panel">
    <div class="input-grid">
      <div class="field field-wt">
        <label>Weight (kg)</label>
        <input type="number" id="wtKg" min="1" max="80" step="0.1" placeholder="e.g. 15">
      </div>
      <div class="or-sep">or estimate by</div>
      <div class="field field-age">
        <label>Age</label>
        <input type="number" id="ageNum" min="0" max="14" step="1" placeholder="e.g. 5">
      </div>
      <div class="field field-unit">
        <label>Unit</label>
        <select id="ageUnit">
          <option value="yr">years</option>
          <option value="mo">months</option>
        </select>
      </div>
      <button class="calc-btn" id="calcBtn">Calculate</button>
    </div>
    <div class="brose-bar" id="broseBar" hidden>
      <div class="brose-swatch" id="broseSwatch"></div>
      <span class="brose-label" id="broseLabel"></span>
      <span class="brose-weight" id="broseWeight"></span>
    </div>
  </div>
  <div id="content"></div>
</div>
<script src="app.js"></script>
</body>
</html>
