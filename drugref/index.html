<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drug Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="eyebrow">openFDA Drug Label API</div>
    <h1>Drug Reference</h1>
    <a href="/" class="back" target="_top">← noahpac</a>
  </div>
</header>

<div class="content">
  <div class="panel search-panel">
    <div class="search-row">
      <input type="search" id="q" autocomplete="off" spellcheck="false" maxlength="100"
             placeholder="Generic or brand name — e.g. metformin, warfarin, lisinopril">
      <button class="search-btn" id="searchBtn">Search</button>
    </div>
    <div class="hint">Use <a href="/lookup/">Code &amp; Drug Lookup</a> to find exact names, then click <strong>Drug label →</strong></div>
  </div>
  <div id="content">
    <div class="state">Enter a drug name above to pull FDA structured label data and recent recalls</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
