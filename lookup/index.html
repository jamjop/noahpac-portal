<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <link rel="stylesheet" href="/assets/fonts.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code &amp; Drug Lookup</title><link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="eyebrow">NLM Clinical Tables · Live API Search</div>
    <h1>Code &amp; Drug Lookup</h1>
    <a href="/" class="back" target="_top">← noahpac</a>
  </div>
</header>

<div class="content">
  <div class="panel search-panel">
    <div class="tab-pills" id="tabs"></div>
    <div class="search-row">
      <input type="search" id="q" autocomplete="off" spellcheck="false" maxlength="120">
      <span class="search-icon" id="searchIcon">⌕</span>
      <div class="spinner" id="spinner"></div>
    </div>
  </div>
  <div id="results">
    <div class="state">Type to search — or press <kbd>/</kbd> to focus<br>Results stream live from NLM as you type</div>
  </div>
</div>
<script src="app.js?v=2"></script>
</body>
</html>
