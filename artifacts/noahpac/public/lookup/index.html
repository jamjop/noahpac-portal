<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code & Drug Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="eyebrow">NLM Clinical Tables · Live API Search</div>
    <h1>Code &amp; Drug Lookup</h1>
    <a href="/" class="back">← noahpac</a>
  </div>
</header>

<div class="search-area">
  <div class="tab-pills" id="tabs"></div>
  <div class="search-row">
    <input type="search" id="q" autocomplete="off" spellcheck="false" maxlength="120">
    <span class="search-icon" id="searchIcon">⌕</span>
    <div class="spinner" id="spinner"></div>
  </div>
</div>

<div class="content">
  <div id="results">
    <div class="state">Type to search — or press <kbd>/</kbd> to focus<br>Results stream live from NLM as you type</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
